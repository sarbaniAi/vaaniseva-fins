bundle:
  name: vaaniseva

variables:
  app_name:
    description: "Name for the Databricks App (must be unique in workspace)"
    default: vaaniseva

resources:
  apps:
    vaaniseva:
      name: ${var.app_name}
      description: "VaaniSeva — Sovereign AI Voice & WhatsApp Agent for Indian BFSI Collections"
      source_code_path: .

targets:
  dev:
    default: true
    mode: development
  prod:
    mode: production
